<section class="ml-72">

  <app-sideNav></app-sideNav>

  <div class="container">
    <div class="bg-black bg-opacity-50 rounded-bl-3xl rounded-br-3xl text-center py-5 ">
      <h2 class="text-3xl font-bold">Descargas</h2>
      <p>Aqui se mostraran tus archivos mp3, cursos, drumkits que hayas descargado...</p>
    </div>


    <div class="mt-10 bg-black inline-block">
      <img [src]="[soundPacks[1].srcPhoto]" alt="soundPackImage" class="w-80 h-80 object-cover">
      <div class="p-1 text-center">
        <h6 class="mt-2 p-1">{{soundPacks[1].name}}</h6>
        <button type='button' class="my-4 bg-green-900 bg-opacity-50 p-3">Download</button>
      </div>

    </div>

  </div>
</section>
